<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Food Cafe Demo</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #fff8f0;
    }

    header {
      background-color: #ff6b35;
      color: white;
      padding: 15px;
      text-align: center;
    }

    nav {
      display: flex;
      justify-content: center;
      background-color: #333;
    }

    nav a {
      color: white;
      padding: 14px 20px;
      text-decoration: none;
    }

    nav a:hover {
      background-color: #ff6b35;
    }

    .hero {
      text-align: center;
      padding: 50px;
      background-image: url('https://images.unsplash.com/photo-1504674900247-0877df9cc836');
      background-size: cover;
      color: white;
    }

    .menu {
      padding: 20px;
      text-align: center;
    }

    .menu-items {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
    }

    .item {
      background: white;
      margin: 10px;
      padding: 15px;
      border-radius: 10px;
      width: 200px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    .item button {
      background-color: #ff6b35;
      color: white;
      border: none;
      padding: 10px;
      cursor: pointer;
      border-radius: 5px;
    }

    .item button:hover {
      background-color: #e85a2a;
    }

    footer {
      text-align: center;
      padding: 15px;
      background-color: #333;
      color: white;
    }
  </style>
</head>
<body>

<header>
  <h1>??? Food Cafe</h1>
  <p>Delicious food, cozy vibes</p>
</header>

<nav>
  <a href="#">Home</a>
  <a href="#menu">Menu</a>
  <a href="#contact">Contact</a>
</nav>

<section class="hero">
  <h2>Welcome to Our Cafe</h2>
  <p>Fresh food made with love ??</p>
</section>

<section id="menu" class="menu">
  <h2>Our Menu</h2>
  <div class="menu-items">
    
    <div class="item">
      <h3>Burger</h3>
      <p>$5.99</p>
      <button onclick="order('Burger')">Order</button>
    </div>

    <div class="item">
      <h3>Pizza</h3>
      <p>$8.99</p>
      <button onclick="order('Pizza')">Order</button>
    </div>

    <div class="item">
      <h3>Pasta</h3>
      <p>$6.99</p>
      <button onclick="order('Pasta')">Order</button>
    </div>

    <div class="item">
      <h3>Coffee</h3>
      <p>$2.99</p>
      <button onclick="order('Coffee')">Order</button>
    </div>

  </div>
</section>

<section id="contact" class="menu">
  <h2>Contact Us</h2>
  <p>Email: foodcafe@example.com</p>
  <p>Phone: +123 456 7890</p>
</section>

<footer>
  <p>© 2026 Food Cafe | All Rights Reserved</p>
</footer>

<script>
  function order(item) {
    alert("You ordered: " + item);
  }
</script>

</body>
</html>
